<h1>Historique des achats</h1>

<p>Nombre : {{ historiques.length }}</p>

<h2>{{ modeModification ? 'Modifier' : 'Ajouter' }}</h2>

<form>
  <label>ID Fournisseur:</label>
  <input type="number" [(ngModel)]="selectedFournisseurId" name="fournisseurId" required>

  <label>Produit:</label>
  <input type="text" [(ngModel)]="nouveau.produit" name="produit" required>

  <label>Quantité:</label>
  <input type="number" [(ngModel)]="nouveau.quantite" name="quantite" required min="1">

  <label>Délai livraison:</label>
  <input type="number" [(ngModel)]="nouveau.delaiLivraison" name="delai" required min="0">

  <button type="button" *ngIf="!modeModification" (click)="ajouter()">
    Ajouter
  </button>

  <button type="button" *ngIf="modeModification" (click)="modifier()">
    Update
  </button>

  <button type="button" *ngIf="modeModification" (click)="reset()">
    Annuler
  </button>
</form>

<br>

<table border="1">
  <tr>
    <th>ID</th>
    <th>ID Fournisseur</th>
    <th>Produit</th>
    <th>Quantité</th>
    <th>Délai</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let h of historiques">
    <td>{{ h.id }}</td>
    <td>{{ h.fournisseur?.id }}</td>
    <td>{{ h.produit }}</td>
    <td>{{ h.quantite }}</td>
    <td>{{ h.delaiLivraison }}</td>
    <td>
      <button type="button" (click)="charger(h)">Modifier</button>
      <button type="button" (click)="supprimer(h.id!)">Supprimer</button>
    </td>
  </tr>
</table>
