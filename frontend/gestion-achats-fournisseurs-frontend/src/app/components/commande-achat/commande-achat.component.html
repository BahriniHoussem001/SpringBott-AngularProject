<h1>Liste des commandes</h1>

<p>Nombre de commandes : {{ commandes.length }}</p>

<h2>{{ modeModification ? 'Modifier une commande' : 'Ajouter une commande' }}</h2>

<form>
  <div>
    <label for="fournisseurId">ID Fournisseur :</label>
    <select [(ngModel)]="selectedFournisseurId" name="fournisseurId" required>
      <option *ngFor="let f of fournisseurs" [ngValue]="f.id">
    {{ f.nom }}
      </option>
    </select>
  </div>

  <div>
    <label for="date">Date :</label>
    <input
      id="date"
      type="date"
      [(ngModel)]="nouvelleCommande.date"
      name="date"
      required>
  </div>

  <div>
    <label for="statut">Statut :</label>
    <input
      id="statut"
      type="text"
      [(ngModel)]="nouvelleCommande.statut"
      name="statut"
      required>
  </div>

  <div>
    <label for="montant">Montant :</label>
    <input
      id="montant"
      type="number"
      [(ngModel)]="nouvelleCommande.montant"
      name="montant"
      required
      min="0"
      step="0.01">
  </div>

  <button type="button" (click)="ajouterCommande()">Ajouter</button>

  <button
    type="button"
    *ngIf="modeModification"
    (click)="modifierCommande()">
    Mettre à jour
  </button>

  <button
    type="button"
    *ngIf="modeModification"
    (click)="reinitialiserFormulaire()">
    Annuler
  </button>
</form>

<br>

<table border="1" cellpadding="8" cellspacing="0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Fournisseur</th>
      <th>Date</th>
      <th>Statut</th>
      <th>Montant</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let commande of commandes">
      <td>{{ commande.id }}</td>
      <td>{{ commande.fournisseur?.nom }}</td>
      <td>{{ commande.date }}</td>
      <td>{{ commande.statut }}</td>
      <td>{{ commande.montant }}</td>
      <td>
        <button type="button" (click)="chargerCommandePourModification(commande)">
          Modifier
        </button>
        <button type="button" (click)="supprimerCommande(commande.id!)">
          Supprimer
        </button>
      </td>
    </tr>
  </tbody>
</table>
